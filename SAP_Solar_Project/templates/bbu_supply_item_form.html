{% extends "base.html" %}

{% block title %}Add BBU Supply Item - EMSolar{% endblock %}

{% block content %}
<h2 class="mb-3">Add BBU Supply Item for Project: {{ project.name }}</h2>

{% if error %}
<div class="alert alert-danger" role="alert">
    {{ error }}
</div>
{% endif %}

<form method="POST" action="/projects/{{ project.id }}/add_bbu_supply_item">
    <div class="mb-3">
        <label for="sl_no" class="form-label">Sl No.</label>
        <input type="text" class="form-control" id="sl_no" name="sl_no" required>
    </div>
    <div class="mb-3">
        <label for="item_description" class="form-label">Item Description</label>
        <input type="text" class="form-control" id="item_description" name="item_description" required>
    </div>
    <div class="mb-3">
        <label for="qty" class="form-label">Quantity</label>
        <input type="number" step="0.01" class="form-control" id="qty" name="qty" required>
    </div>
    <div class="mb-3">
        <label for="uom" class="form-label">UOM</label>
        <input type="text" class="form-control" id="uom" name="uom" required>
    </div>
    <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" id="price" name="price" required>
    </div>
    <div class="mb-3">
        <label for="taxable_value" class="form-label">Taxable Value</label>
        <input type="number" step="0.01" class="form-control" id="taxable_value" name="taxable_value" required>
    </div>
    <div class="mb-3">
        <label for="gst_rate" class="form-label">GST Rate (%)</label>
        <input type="text" class="form-control" id="gst_rate" name="gst_rate" required>
    </div>
    <div class="mb-3">
        <label for="gst_amount" class="form-label">GST Amount</label>
        <input type="number" step="0.01" class="form-control" id="gst_amount" name="gst_amount" required>
    </div>
    <div class="mb-3">
        <label for="total_amount" class="form-label">Total Amount</label>
        <input type="number" step="0.01" class="form-control" id="total_amount" name="total_amount" required>
    </div>
    <button type="submit" class="btn btn-primary">Add BBU Supply Item</button>
    <a href="/projects/{{ project.id }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
