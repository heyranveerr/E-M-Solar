{% extends "base.html" %}

{% block title %}Projects - EMSolar{% endblock %}

{% block content %}
<h2 class="mb-3">Project List</h2>
<a href="/projects/new" class="btn btn-primary mb-3">Add New Project</a>
<ul class="list-group">
    {% for project in projects %}
    <li class="list-group-item">
        <a href="/projects/{{ project.id }}">{{ project.name }}</a> - {{ project.status }}
    </li>
    {% else %}
    <li class="list-group-item">No projects found.</li>
    {% endfor %}
</ul>
{% endblock %}
