{% extends "base.html" %}

{% block title %}Import Materials - EMSolar{% endblock %}

{% block content %}
<h2 class="mb-3">Import Materials for Project: {{ project.name }}</h2>

{% if error %}
<div class="alert alert-danger" role="alert">
    {{ error }}
</div>
{% endif %}

<form method="POST" action="/projects/{{ project.id }}/import_materials" enctype="multipart/form-data">
    <div class="mb-3">
        <label for="file" class="form-label">Upload Excel or CSV File</label>
        <input type="file" class="form-control" id="file" name="file" accept=".xlsx,.csv" required>
    </div>
    <button type="submit" class="btn btn-primary">Import Materials</button>
    <a href="/projects/{{ project.id }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
